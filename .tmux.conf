set -g default-shell $SHELL
# set -g default-terminal "screen-256color"
set -g default-terminal $TERM
# set -g default-command "reattach-to-user-namespace -l ${SHELL}"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -sg escape-time 10
set -g focus-events on
set -g allow-passthrough on
set-option -ga terminal-overrides ",xterm-256color:Tc"

run-shell "powerline-daemon -q"
source "~/.local/pipx/venvs/powerline-status/lib/python3.13/site-packages/powerline/bindings/tmux/powerline.conf"
setw -g mode-keys vi
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "reattach-to-user-namespace pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "reattach-to-user-namespace pbcopy"

# run-shell /usr/local/src/tmux-safekill/safekill.tmux
set -g @plugin 'seebi/tmux-colors-solarized'
set -g @colors-solarized 'dark'
run '~/.tmux/plugins/tpm/tpm'

setw -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Active pane focus highlight — solarized hex values
set -g pane-border-style        'fg=#586e75'          # base01
set -g pane-active-border-style 'fg=#268bd2,bold'     # blue
set -g window-style             'bg=#002b36'          # base03 for inactive
set -g window-active-style      'bg=#001c24'          # darker for active
